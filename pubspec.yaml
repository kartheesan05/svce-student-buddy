name: diary
description: "A student companion app for university students."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.2
  dynamic_color: ^1.7.0
  http: ^1.3.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: assets/icon/app_icon.png
  android: true
  ios: true
  macos:
    generate: true
    image_path: assets/icon/app_icon.png

flutter:
  uses-material-design: true
