name: Android APK Release

on:
  push:
    tags:
      - "v*.*.*" # example: v0.1.0
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            build
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks

      - name: Create android/key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../upload-keystore.jks
          EOF

      - name: Build signed release APK
        run: flutter build apk --release

      - name: Verify APK exists
        run: ls -lh build/app/outputs/flutter-apk/

      - name: Compute APK filename from tag
        id: vars
        run: |
          VERSION="${GITHUB_REF_NAME}"   # e.g. v0.1.0
          APK_NAME="student_buddy-${VERSION}.apk"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/${{ steps.vars.outputs.apk_name }}"

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/${{ steps.vars.outputs.apk_name }}
          generate_release_notes: true