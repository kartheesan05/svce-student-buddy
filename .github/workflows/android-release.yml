name: Android APK Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Android CMake
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/cmake
          key: ${{ runner.os }}-cmake-3.22.1

      - name: Install dependencies
        run: flutter pub get

      - name: Install Android components
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1"

      - name: Disable Gradle file system watching
        run: |
          mkdir -p "$HOME/.gradle"
          echo "org.gradle.vfs.watch=false" >> "$HOME/.gradle/gradle.properties"

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks

      - name: Create android/key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../upload-keystore.jks
          EOF

      - name: Create secrets.json
        run: |
          cat > secrets.json <<'EOF'
          ${{ secrets.APP_SECRETS_JSON }}
          EOF

      - name: Build signed release APK
        run: flutter build apk --release --dart-define-from-file=secrets.json

      - name: Compute APK filename
        id: vars
        run: |
          VERSION="${GITHUB_REF_NAME:-manual}"
          echo "apk_name=student-buddy-${VERSION}.apk" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            "build/app/outputs/flutter-apk/${{ steps.vars.outputs.apk_name }}"

      - name: Create GitHub Release and upload APK
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/${{ steps.vars.outputs.apk_name }}
          generate_release_notes: true

      - name: Upload APK (versioned)
        run: |
          aws s3 cp \
            "build/app/outputs/flutter-apk/${{ steps.vars.outputs.apk_name }}" \
            "s3://${{ secrets.R2_BUCKET_NAME }}/${{ steps.vars.outputs.apk_name }}" \
            --endpoint-url "https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com" \
            --region auto
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Upload APK (latest)
        run: |
          aws s3 cp \
            "build/app/outputs/flutter-apk/${{ steps.vars.outputs.apk_name }}" \
            "s3://${{ secrets.R2_BUCKET_NAME }}/student-buddy-latest.apk" \
            --endpoint-url "https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com" \
            --region auto \
            --cache-control "no-cache"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}